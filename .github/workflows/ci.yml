name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: typecheck + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Smoke tests
        run: pnpm test:smoke
        env:
          DATABASE_URL: "file:./prisma/dev.db"

  py-syntax:
    name: python sidecar syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m py_compile services/ai/main.py services/ai/routers/*.py
